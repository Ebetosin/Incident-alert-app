# ── ConfigMap ──────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: incident-config
  labels:
    app: incident-hub
data:
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: incident_hub
  REDIS_HOST: redis
  REDIS_PORT: "6379"
---
# ── Backend Deployment ─────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-backend
  labels:
    app: incident-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: incident-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: incident-backend
    spec:
      containers:
      - name: backend
        image: incident-backend:latest
        ports:
        - containerPort: 8090
        envFrom:
        - configMapRef:
            name: incident-config
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8090
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8090
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: incident-backend
spec:
  selector:
    app: incident-backend
  ports:
  - port: 8090
    targetPort: 8090
---
# ── Frontend Deployment ────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-frontend
  labels:
    app: incident-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: incident-frontend
  template:
    metadata:
      labels:
        app: incident-frontend
    spec:
      containers:
      - name: frontend
        image: incident-frontend:latest
        ports:
        - containerPort: 5180
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 5180
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 5180
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: incident-frontend
spec:
  selector:
    app: incident-frontend
  ports:
  - port: 80
    targetPort: 5180
---
# ── Ingress ────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: incident-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/websocket-services: incident-backend
spec:
  rules:
  - host: incident.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: incident-backend
            port:
              number: 8090
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: incident-backend
            port:
              number: 8090
      - path: /
        pathType: Prefix
        backend:
          service:
            name: incident-frontend
            port:
              number: 80
