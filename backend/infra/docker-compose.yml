services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: incident_hub
      POSTGRES_USER: incident_user
      POSTGRES_PASSWORD: ${INCIDENT_POSTGRES_PASSWORD:-change-me-postgres}
    ports:
      - "5433:5432"
    volumes:
      - incident_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_user -d incident_hub"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${INCIDENT_REDIS_PASSWORD:-change-me-redis} --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${INCIDENT_REDIS_PASSWORD:-change-me-redis} ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9101"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ${INCIDENT_MINIO_ROOT_PASSWORD:-change-me-minio}
    ports:
      - "9100:9000"
      - "9101:9101"
    volumes:
      - incident_minio_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: incident_hub
      DB_USER: incident_user
      DB_PASS: ${INCIDENT_POSTGRES_PASSWORD:-change-me-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${INCIDENT_REDIS_PASSWORD:-change-me-redis}
      JWT_SECRET: ${INCIDENT_JWT_SECRET:-replace-with-base64-jwt-secret}
      BLOB_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5180:5180"
    depends_on:
      - backend
    restart: unless-stopped

  load-balancer:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "81:80"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  incident_pg_data:
  incident_minio_data:
